name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx biome check hooks/ lib/

  test:
    name: Test (Bun)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun test
      - run: bun test --coverage

  test-node:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      # Run only the node:test files (skip bun:test files)
      - run: node --test test/submit.test.mjs test/integration.test.mjs test/edge-cases.test.mjs test/transcript.test.mjs test/extract-helpers.test.mjs test/compaction-e2e.test.mjs test/trim.test.mjs test/tool-summary.test.mjs test/tokens.test.mjs test/handoff.test.mjs
